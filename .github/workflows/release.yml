name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0). Leave blank to use Cargo.toml version.'
        required: false
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build binary + deb + rpm (x86_64-linux)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            v=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
            echo "version=$v" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binary
        run: cargo build --release --locked

      - name: Strip binary
        run: strip target/release/fili

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb
        run: cargo deb --no-build --output target/debian/

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Build .rpm
        # cargo-generate-rpm's --output wants a file path, not a dir;
        # omitting it writes to target/generate-rpm/<pkg>-<ver>-1.<arch>.rpm.
        run: cargo generate-rpm

      - name: Package raw tarball
        run: |
          mkdir -p dist
          tar -czf "dist/fili-${{ steps.ver.outputs.version }}-x86_64-linux.tar.gz" \
            -C target/release fili \
            -C "$GITHUB_WORKSPACE" README.md rules.json

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fili-${{ steps.ver.outputs.version }}
          path: dist/

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: fili-${{ needs.build.outputs.version }}
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          # Tag-triggered runs have no `inputs` context; publish those
          # directly. workflow_dispatch keeps its draft toggle.
          draft: ${{ inputs.draft || false }}
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
