<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>fili</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">fili</div>

    <div class="side-scroll">
      <div class="side-section">
        <div class="side-label">Navigate</div>
        <nav class="side-nav" id="side-nav">
          <a href="#/" data-route="browse"><span class="side-icon">📂</span>Browse</a>
          <a href="#/search" data-route="search"><span class="side-icon">🔍</span>Search</a>
          <a href="#/overview" data-route="overview"><span class="side-icon">📊</span>Overview</a>
          <a href="#/drives" data-route="drives"><span class="side-icon">💾</span>Drives</a>
          <a href="#/backup" data-route="backup"><span class="side-icon">📦</span>Backup</a>
        </nav>
      </div>

      <div class="side-section">
        <div class="side-label">Places</div>
        <nav class="side-nav" id="side-places">
          <a class="side-loading">…</a>
        </nav>
      </div>

      <div class="side-section">
        <div class="side-label">Mounts</div>
        <nav class="side-nav" id="side-mounts">
          <a class="side-loading">…</a>
        </nav>
      </div>

      <div class="side-section">
        <div class="side-label">Recent</div>
        <nav class="side-nav" id="side-recent">
          <a class="side-loading">…</a>
        </nav>
      </div>
    </div>

    <div class="side-stats" id="side-stats">
      <div class="side-stat"><span class="side-stat-value" data-field="collection_count">—</span><span class="side-stat-label">collections</span></div>
      <div class="side-stat"><span class="side-stat-value" data-field="item_count">—</span><span class="side-stat-label">items</span></div>
      <div class="side-stat"><span class="side-stat-value" data-field="unknown_count">—</span><span class="side-stat-label">unknowns</span></div>
      <div class="side-stat"><span class="side-stat-value" data-field="total_size">—</span><span class="side-stat-label">indexed</span></div>
      <div class="side-stat"><span class="side-stat-value" data-field="drives">—</span><span class="side-stat-label">drives</span></div>
      <div class="side-stat"><span class="side-stat-value" data-field="last_scan">—</span><span class="side-stat-label">last scan</span></div>
    </div>
  </aside>

  <main id="view">
    <p class="loading">Loading…</p>
  </main>
</div>

<template id="tpl-browse">
  <section class="browse">
    <div class="browse-toolbar">
      <nav class="breadcrumbs" id="breadcrumbs"></nav>
      <span class="current-inline" id="current" hidden>
        <span class="kind-pill kind-indexed kind-link" data-field="base_type"></span>
        <span class="privacy-icon" data-field="privacy" title=""></span>
        <span class="tags-inline" data-field="tags"></span>
      </span>
      <span class="toolbar-spacer"></span>
      <span id="scan-msg" class="meta"></span>
      <div class="split-btn">
        <button type="button" class="toolbar-btn split-main" id="scan-btn" title="Scan with saved options">⟳ Scan</button>
        <button type="button" class="toolbar-btn split-opts" id="scan-opts-btn" title="Scan options">▾</button>
        <div class="scan-opts-popup" id="scan-opts-popup" hidden>
          <label>Max depth
            <input type="number" id="scan-depth" min="0" step="1" placeholder="unlimited" />
          </label>
          <label><input type="checkbox" id="scan-files" /> index files</label>
        </div>
      </div>
      <button type="button" class="toolbar-btn" id="backup-folder-btn" title="Back up this app's settings to the configured backup dir" hidden>📦 Back up</button>
      <button type="button" class="toolbar-btn" id="open-btn" title="Open in file manager">🗁 Open</button>
    </div>

    <section class="entries-section">
      <table class="entries-table">
        <thead><tr>
          <th></th><th>Name</th><th>Kind</th><th>Info</th><th></th>
        </tr></thead>
        <tbody id="entries-body"></tbody>
      </table>
    </section>
    <div class="status-bar" id="status-bar"></div>
  </section>
</template>

<template id="tpl-search">
  <section class="search">
    <div class="page-toolbar">
      <h2 class="page-title">Search</h2>
      <form class="filters" id="filters">
        <input name="q" placeholder="name or path…" />
        <input name="tag" placeholder="tag" />
        <select name="type">
          <option value="">Any type</option>
          <option>ai-model</option>
          <option>application</option>
          <option>archive</option>
          <option>audio</option>
          <option>book</option>
          <option>boot</option>
          <option>build-artifact</option>
          <option>cache</option>
          <option>code</option>
          <option>config</option>
          <option>dependencies</option>
          <option>devices</option>
          <option>document</option>
          <option>emulator</option>
          <option>game</option>
          <option>gamedata</option>
          <option>generic</option>
          <option>home</option>
          <option>image</option>
          <option>inbox</option>
          <option>mount</option>
          <option>procfs</option>
          <option>services</option>
          <option>swap</option>
          <option>sysfs</option>
          <option>system</option>
          <option>video</option>
          <option>vm</option>
        </select>
        <select name="privacy">
          <option value="">Any privacy</option>
          <option>public</option><option>personal</option><option>confidential</option>
        </select>
        <button type="submit" class="toolbar-btn">Search</button>
      </form>
    </div>
    <div class="page-body">
      <table class="collections-table">
        <thead><tr><th>Name</th><th>Type</th><th>Privacy</th><th>Path</th></tr></thead>
        <tbody id="collections-body"></tbody>
      </table>
    </div>
    <div class="status-bar" id="status-bar"></div>
  </section>
</template>

<template id="tpl-overview">
  <section class="overview">
    <div class="page-toolbar">
      <h2 class="page-title">Overview</h2>
    </div>
    <div class="page-body">
      <div class="stat-grid">
        <div class="stat"><span class="label">Collections</span><span class="value" data-field="collection_count"></span></div>
        <div class="stat"><span class="label">Unknowns</span><span class="value" data-field="unknown_count"></span></div>
        <div class="stat"><span class="label">Unprotected</span><span class="value" data-field="unprotected_count"></span></div>
        <div class="stat"><span class="label">Devices</span><span class="value" data-field="device_count"></span></div>
        <div class="stat"><span class="label">Locations</span><span class="value" data-field="location_count"></span></div>
      </div>
      <h3>By type</h3>
      <table class="type-table">
        <thead><tr><th>Type</th><th>Count</th></tr></thead>
        <tbody data-field="by_type"></tbody>
      </table>
    </div>
  </section>
</template>

<template id="tpl-drives">
  <section class="drives">
    <div class="page-toolbar">
      <h2 class="page-title">Drives</h2>
      <span class="toolbar-spacer"></span>
      <span class="meta">storage media by filesystem UUID</span>
    </div>
    <div class="page-body">
      <table class="drives-table">
        <thead><tr>
          <th>Name</th><th>Label</th><th>Mount</th><th>FS</th><th>Size</th>
          <th>Model</th><th>Serial</th><th>UUID</th><th>Last seen</th>
        </tr></thead>
        <tbody id="drives-body"></tbody>
      </table>
    </div>
    <div class="status-bar" id="status-bar"></div>
  </section>
</template>

<template id="tpl-backup">
  <section class="backup">
    <div class="page-toolbar">
      <h2 class="page-title">Backup</h2>
      <span class="toolbar-spacer"></span>
      <span id="backup-msg" class="meta"></span>
    </div>
    <div class="page-body">
      <p class="page-intro">
        Snapshot app settings using the bestiary catalog as the source
        of truth for paths. The destination defaults to
        <code data-field="backup-dir">…</code>; a <code>gaming</code>
        category override can route game saves elsewhere.
      </p>
      <div id="backup-config-warning" class="backup-warning" hidden>
        <strong>No backup location set.</strong>
        Add a <code>backup_dir</code> entry to
        <code>~/.config/fili/config.toml</code>:
<pre>backup_dir = "/path/to/backups"

[backup_dir_by_category]
gaming = "/path/to/game saves"</pre>
        then reload this page.
      </div>
      <div class="backup-form" id="backup-form">
        <fieldset class="backup-options">
          <label><input type="checkbox" id="backup-include-cache" /> Include cache (sessions, browser cookies)</label>
          <label><input type="checkbox" id="backup-include-state" /> Include state (logs)</label>
        </fieldset>
      </div>
      <div class="backup-apps" id="backup-apps">
        <div class="loading">Loading…</div>
      </div>
      <pre class="backup-output" id="backup-output" hidden></pre>
    </div>
  </section>
</template>

<template id="tpl-unknowns">
  <section class="unknowns">
    <div class="page-toolbar">
      <h2 class="page-title">Unknowns</h2>
    </div>
    <div class="page-body">
      <table class="unknowns-table">
        <thead><tr>
          <th>Path</th><th>Parent</th><th>Files</th><th>Dirs</th><th>Size</th><th>Top ext</th>
        </tr></thead>
        <tbody id="unknowns-body"></tbody>
      </table>
    </div>
    <div class="status-bar" id="status-bar"></div>
  </section>
</template>

<template id="tpl-locations">
  <section class="locations">
    <div class="page-toolbar">
      <h2 class="page-title">Locations</h2>
    </div>
    <div class="page-body">
      <table class="locations-table">
        <thead><tr><th>Name</th><th>Path</th><th>Flags</th><th>Last scan</th></tr></thead>
        <tbody id="locations-body"></tbody>
      </table>
    </div>
    <div class="status-bar" id="status-bar"></div>
  </section>
</template>

<script src="app.js"></script>
</body>
</html>
